<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<!-- 모바일 최적화: 확대/축소 방지, 화면 폭에 맞춤 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0d1b2a" />
<title>진(秦) 제국 : 통일과 몰락의 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- 한글 서예풍 제목 폰트 + 가독성 좋은 본문 폰트 (교사가 인터넷이 안 되는 환경이면 이 두 줄을 지워도 시스템 폰트로 대체됩니다) -->
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ============================================================
     화면 1. 타이틀 화면
     ============================================================ -->
<section id="screen-title" class="screen active">
  <div class="title-bg-deco" aria-hidden="true"></div>
  <div class="title-wrap">
    <p class="title-eyebrow">중학 세계사 교육용 비주얼노벨 RPG</p>
    <h1 class="title-main">진(秦) 제국<br><span>통일과 몰락의 기록</span></h1>
    <p class="title-desc">기원전 221년, 천하를 통일한 최초의 황제가 되어 제국을 다스린다.<br>당신의 선택이 백성과 조정, 그리고 역사를 바꾼다.</p>

    <div class="title-buttons">
      <button id="btn-new-game" class="btn btn-primary">새로 시작하기</button>
      <button id="btn-continue" class="btn btn-secondary" disabled>이어하기</button>
      <button id="btn-open-settings" class="btn btn-ghost">설정</button>
    </div>
    <p class="title-footer">플레이 시간 약 15~20분 · 저장은 자동/수동 모두 가능</p>
  </div>
</section>

<!-- ============================================================
     화면 2. 설정 팝업 (오버레이 - 어느 화면에서든 열림)
     ============================================================ -->
<section id="screen-settings" class="screen overlay">
  <div class="settings-box">
    <h2>설정</h2>

    <div class="settings-row">
      <span>효과음</span>
      <button id="btn-toggle-sound" class="toggle-btn" data-on="true">ON</button>
    </div>

    <div class="settings-row">
      <span>텍스트 속도</span>
      <div class="speed-options">
        <button class="speed-btn" data-speed="slow">느리게</button>
        <button class="speed-btn" data-speed="normal">보통</button>
        <button class="speed-btn" data-speed="fast">빠르게</button>
      </div>
    </div>

    <div class="settings-row" id="row-restart">
      <span>저장 데이터 삭제 후 새로 시작</span>
      <button id="btn-reset-save" class="btn btn-danger-small">삭제</button>
    </div>

    <button id="btn-close-settings" class="btn btn-primary">닫기</button>
  </div>
</section>

<!-- ============================================================
     화면 3. 실제 게임 플레이 화면
     ============================================================ -->
<section id="screen-game" class="screen">

  <!-- 배경 이미지 레이어 (fade 전환) -->
  <div id="bg-layer" class="bg-layer"></div>
  <div class="bg-shade" aria-hidden="true"></div>

  <!-- 상단 : 능력치 패널 + 메뉴 버튼 -->
  <header class="stat-panel">
    <div class="stat-item" data-stat="wangkwon">
      <span class="stat-label">황권</span>
      <div class="stat-bar"><div class="stat-fill" id="fill-wangkwon"></div></div>
    </div>
    <div class="stat-item" data-stat="minsim">
      <span class="stat-label">민심</span>
      <div class="stat-bar"><div class="stat-fill" id="fill-minsim"></div></div>
    </div>
    <div class="stat-item" data-stat="gunsa">
      <span class="stat-label">군사</span>
      <div class="stat-bar"><div class="stat-fill" id="fill-gunsa"></div></div>
    </div>
    <div class="stat-item" data-stat="jaejeong">
      <span class="stat-label">재정</span>
      <div class="stat-bar"><div class="stat-fill" id="fill-jaejeong"></div></div>
    </div>
    <button id="btn-ingame-menu" class="icon-btn" title="메뉴">☰</button>
  </header>

  <!-- 챕터 전환 시 잠깐 보여주는 카드 -->
  <div id="chapter-banner" class="chapter-banner">
    <span id="chapter-banner-text"></span>
  </div>

  <!-- 인게임 메뉴 (저장/불러오기/설정/타이틀로) -->
  <div id="ingame-menu-popup" class="ingame-menu-popup">
    <button id="btn-do-save" class="btn btn-secondary">현재 진행 저장</button>
    <button id="btn-open-settings-2" class="btn btn-secondary">설정</button>
    <button id="btn-to-title" class="btn btn-ghost">타이틀로 나가기</button>
    <button id="btn-close-menu" class="btn btn-ghost">닫기</button>
  </div>

  <!-- NPC 이미지 레이어 -->
  <div class="npc-layer">
    <img id="npc-image" src="" alt="" class="npc-image hidden" />
  </div>

  <!-- 하단 대화창 (비주얼노벨 스타일) -->
  <div id="dialogue-box" class="dialogue-box">
    <div id="speaker-name" class="speaker-name hidden"></div>
    <p id="dialogue-text" class="dialogue-text"></p>
    <div id="continue-indicator" class="continue-indicator hidden">▼</div>
  </div>

  <!-- 선택지 버튼 영역 -->
  <div id="choice-container" class="choice-container hidden"></div>

</section>

<!-- ============================================================
     화면 4. 엔딩 화면
     ============================================================ -->
<section id="screen-ending" class="screen">
  <div class="ending-wrap">
    <p class="ending-eyebrow">당신이 써 내려간 제국의 역사</p>
    <h2 id="ending-title" class="ending-title"></h2>
    <p id="ending-summary" class="ending-summary"></p>

    <div class="ending-stats" id="ending-stats"></div>

    <button id="btn-show-history" class="btn btn-primary">실제 역사와 비교해보기</button>

    <div id="history-compare" class="history-compare hidden">
      <h3 id="history-title"></h3>
      <p id="history-text"></p>
    </div>

    <div class="ending-actions">
      <button id="btn-restart" class="btn btn-secondary">처음부터 다시 하기</button>
    </div>
  </div>
</section>

<!-- 효과음 재생을 위한 audio 요소 (사운드 파일은 /sfx 폴더, 없으면 조용히 무시됨) -->
<audio id="sfx-click" src="sfx/click.mp3" preload="auto"></audio>
<audio id="sfx-choice" src="sfx/choice.mp3" preload="auto"></audio>
<audio id="sfx-chapter" src="sfx/chapter.mp3" preload="auto"></audio>

<!-- 스크립트 로딩 순서가 중요합니다: 데이터/유틸 -> UI -> 메인 로직 -->
<script src="save.js"></script>
<script src="scenario.js"></script>
<script src="ending.js"></script>
<script src="ui.js"></script>
<script src="script.js"></script>
</body>
</html>
